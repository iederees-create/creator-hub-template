<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Hub Pro | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body style="padding-top: 80px;">

  <!-- Layout Mount -->
  <div id="creator-header-mount"></div>

  <!-- Portfolio Gallery -->
  <section class="gallery-section" id="portfolio">
    <div class="section-header">
      <h2>Media Flux Grid</h2>
      <p>A curated look at my latest brand campaigns, fashion editorials, and everyday lifestyle moments.</p>
    </div>
    <div class="gallery-grid">
      <div class="gallery-item">
        <img src="assets/fashion.png" alt="High Fashion Editorial">
        <div class="gallery-overlay">
          <div class="gallery-text">
            <p>Editorial</p>
            <h3>Summer Collection '26</h3>
          </div>
        </div>
      </div>
      <div class="gallery-item">
        <img src="assets/lifestyle.png" alt="Lifestyle & Beauty">
        <div class="gallery-overlay">
          <div class="gallery-text">
            <p>Beauty</p>
            <h3>Everyday Essentials</h3>
          </div>
        </div>
      </div>
      <div class="gallery-item">
        <img src="assets/hero.png" alt="Travel & Lifestyle" style="object-position: top;">
        <div class="gallery-overlay">
          <div class="gallery-text">
            <p>Travel</p>
            <h3>Cape Town Diaries</h3>
          </div>
        </div>
      </div>
      <!-- Add more dummy items to show scale -->
      <div class="gallery-item">
        <img src="assets/fashion.png" alt="Studio Shot" style="filter: hue-rotate(45deg);">
        <div class="gallery-overlay">
          <div class="gallery-text">
            <p>Campaign</p>
            <h3>Vogue Africa</h3>
          </div>
        </div>
      </div>
      <div class="gallery-item">
        <img src="assets/lifestyle.png" alt="Brand Collab" style="filter: grayscale(0.5);">
        <div class="gallery-overlay">
          <div class="gallery-text">
            <p>Partnership</p>
            <h3>Luxury Skincare</h3>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Layout Mount -->
  <div id="creator-footer-mount"></div>

  <script src="creator-layout.js"></script>
  <script src="app.js"></script>
</body>
</html>
